[mgr]
mouse_events = []

[preview]
wrap = "yes"
max_width = 2000
max_height = 4000

[plugin]
prepend_previewers = [
  { url = "*.svg", run = "svg" },
  { url = "*.zip", run = "archive" },
]
append_previewers = [
  { url = "*", run = "code" },
]

[open]
append_rules = [
  { url = "*", use = ["edit", "open"] },
]
