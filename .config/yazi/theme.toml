[which]
mask            = { bg = "#e7d2be" }

[mgr]
find_keyword  = { fg = "yellow", bold = true, italic = true }
find_position = { fg = "magenta" }

[indicator]
current = { bg = "#e7d2be", bold = true }
parent = { bg = "#e7d2be", bold = true }

[mode]
normal_main = { fg = "black", bg = "#cdd0e0" }
select_main = { fg = "black", bg = "#e6c8c8" }
unset_main = { fg = "black", bg = "#e6c8c8" }

[filetype]
rules = [
  # Image
  # { mime = "image/*", fg = "yellow" },
  # Media
  # { mime = "{audio,video}/*", fg = "magenta" },
  # Archive
  # { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "magenta" },
  # Document
  # { mime = "application/{pdf,doc,rtf}", fg = "cyan" },
  # Virtual file system
  { mime = "vfs/{absent,stale}", fg = "darkgray" },

  { url = "*", is = "orphan", fg = "red" },
  { url = "*", is = "block", fg = "yellow" },
  { url = "*", is = "char", fg = "yellow" },
  { url = "*", is = "fifo", fg = "yellow" },
  { url = "*", is = "sock", fg = "yellow" },
  { url = "*", is = "dummy", fg = "red" },
  { url = "*/", is = "dummy", fg = "red" },
  { url = "*", is = "exec", fg = "green" },
  { url = "*/", fg = "blue" },
  { url = "*", fg = "black" }
]

