<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
<alias>
    <family>sans</family>
    <prefer>
        <family>IBM Plex Sans</family>
    </prefer>
</alias>
<alias>
    <family>sans-serif</family>
    <prefer>
        <family>IBM Plex Sans</family>
    </prefer>
</alias>
<alias>
    <family>serif</family>
    <prefer>
        <family>IBM Plex Serif</family>
    </prefer>
</alias>
<alias binding="same">
    <family>monospace</family>
    <accept>
        <family>IBM Plex Mono</family>
        <family>Fira Code</family>
    </accept>
</alias>

<match>
    <test name="lang" compare="contains">
        <string>zh</string>
    </test>
    <edit name="family" mode="prepend">
        <string>LXGW WenKai</string>
    </edit>
</match>
<match>
    <test name="lang" compare="contains">
        <string>ja</string>
    </test>
    <edit name="family" mode="prepend">
        <string>LXGW WenKai</string>
    </edit>
</match>
<match>
    <test name="lang" compare="contains">
        <string>kr</string>
    </test>
    <edit name="family" mode="prepend">
        <string>LXGW WenKai</string>
    </edit>
</match>
</fontconfig>
