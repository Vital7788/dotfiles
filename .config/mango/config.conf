# https://mangowm.github.io/docs

# dependencies: waybar, kanshi, fuzzel, fnott, wl-clipboard, xdg-desktop-portals-wlr,
#  swayidle, swaylock, swaybg, wlr-dpms,
#  slurp, grim, satty, wf-recorder/wl-screenrec

# TODO look into virtual monitors in mango

# TODO look into gpu settings (e.g. tearing)
# https://mangowm.github.io/docs/configuration/monitors/#tearing-game-mode

# TODO permission authentication with xfce-polkit?

# TODO fcitx5 im
# https://mangowm.github.io/docs/configuration/input/#input-method-editor-ime

### Visuals
# Window effect
border_radius=6
no_radius_when_single=0

# Appearance
gappih=5
gappiv=5
gappoh=10
gappov=10
overviewgappi=5
overviewgappo=30
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=4
rootcolor=0x201b14ff
bordercolor=0x444444ff
focuscolor=0xc9b890ff
maximizescreencolor=0x89aa61ff
urgentcolor=0xad401fff
scratchpadcolor=0x516c93ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
animation_duration_move=400
animation_duration_open=200
animation_duration_tag=300
animation_duration_close=200
animation_duration_focus=0

layerrule=animation_type_open:zoom,layer_name:launcher
layerrule=animation_type_close:zoom,layer_name:launcher
# layerrule=noanim:1,layer_name:launcher

### Input Devices
# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us

# mouse
# need relogin to make it apply
accel_profile=1
mouse_natural_scrolling=0

# cursor
cursor_size=36
cursor_theme=Oxygen_White
env=XCURSOR_SIZE,36
env=XCURSOR_THEME,Oxygen_White
exec_once=gsettings set org.gnome.desktop.interface cursor-theme 'Oxygen_White'
exec_once=gsettings set org.gnome.desktop.interface cursor-size 36

### Layouts
# Master-Stack Layout Setting
new_is_master=0
default_mfact=0.55
default_nmaster=1
smartgaps=0

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:center_tile
tagrule=id:2,layout_name:center_tile
tagrule=id:3,layout_name:center_tile
tagrule=id:4,layout_name:center_tile
tagrule=id:5,layout_name:center_tile
tagrule=id:6,layout_name:center_tile
tagrule=id:7,layout_name:center_tile
tagrule=id:8,layout_name:center_tile
tagrule=id:9,layout_name:center_tile

tagrule=id:1,monitor_name:DP-2,layout_name:deck
tagrule=id:2,monitor_name:DP-2,layout_name:tile
tagrule=id:3,monitor_name:DP-2,layout_name:tile
tagrule=id:4,monitor_name:DP-2,layout_name:tile
tagrule=id:5,monitor_name:DP-2,layout_name:tile
tagrule=id:6,monitor_name:DP-2,layout_name:tile
tagrule=id:7,monitor_name:DP-2,layout_name:tile
tagrule=id:8,monitor_name:DP-2,layout_name:tile
tagrule=id:9,monitor_name:DP-2,layout_name:tile

tagrule=id:1,monitor_name:HDMI-A-1,layout_name:vertical_deck
tagrule=id:2,monitor_name:HDMI-A-1,layout_name:vertical_tile
tagrule=id:3,monitor_name:HDMI-A-1,layout_name:vertical_tile
tagrule=id:4,monitor_name:HDMI-A-1,layout_name:vertical_tile
tagrule=id:5,monitor_name:HDMI-A-1,layout_name:vertical_tile
tagrule=id:6,monitor_name:HDMI-A-1,layout_name:vertical_tile
tagrule=id:7,monitor_name:HDMI-A-1,layout_name:vertical_tile
tagrule=id:8,monitor_name:HDMI-A-1,layout_name:vertical_tile
tagrule=id:9,monitor_name:HDMI-A-1,layout_name:vertical_tile

# switch layout
circle_layout=center_tile,tile,right_tile,scroller,deck,vertical_deck
bind=super,n,switch_layout
bind=super,m,setkeymode,layout
keymode=layout
bind=none,c,setlayout,center_tile
bind=none,t,setlayout,tile
bind=none,r,setlayout,right_tile
bind=none,s,setlayout,scroller
bind=none,d,setlayout,deck
bind=none,v,setlayout,vertical_deck
bind=none,n,switch_layout
bind=none,escape,setkeymode,default
bind=none,return,setkeymode,default
keymode=default

### Focus and Movement
# Misc
focus_on_activate=1
sloppyfocus=1
warpcursor=1
# focus_cross_monitor=1
# exchange_cross_monitor=1
focus_cross_monitor=0
exchange_cross_monitor=0
focus_cross_tag=0

# switch window focus
bind=super,k,focusdir,up
bind=super,j,focusdir,down
bind=super,h,focusdir,left
bind=super,l,focusdir,right

bind=super,up,focusdir,up
bind=super,down,focusdir,down
bind=super,left,focusdir,left
bind=super,right,focusdir,right

bind=super,next,focusstack,next
bind=super,prior,focusstack,prev

# swap window
bind=super+shift,k,exchange_client,up
bind=super+shift,j,exchange_client,down
bind=super+shift,h,exchange_client,left
bind=super+shift,l,exchange_client,right

bind=super+shift,up,exchange_client,up
bind=super+shift,down,exchange_client,down
bind=super+shift,left,exchange_client,left
bind=super+shift,right,exchange_client,right

bind=super+shift,next,exchange_stack_client,next
bind=super+shift,prior,exchange_stack_client,prev

# tag switch
bind=super,1,view,1
bind=super,2,view,2
bind=super,3,view,3
bind=super,4,view,4
bind=super,5,view,5
bind=super,6,view,6
bind=super,7,view,7
bind=super,8,view,8
bind=super,9,view,9
bind=super,0,view,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=super+shift,1,tagsilent,1
bind=super+shift,1,tag,1
bind=super+shift,2,tag,2
bind=super+shift,3,tag,3
bind=super+shift,4,tag,4
bind=super+shift,5,tag,5
bind=super+shift,6,tag,6
bind=super+shift,7,tag,7
bind=super+shift,8,tag,8
bind=super+shift,9,tag,9
bind=super+shift,0,tag,0

# toggle tag
bind=super+alt+shift,1,toggletag,1
bind=super+alt+shift,2,toggletag,2
bind=super+alt+shift,3,toggletag,3
bind=super+alt+shift,4,toggletag,4
bind=super+alt+shift,5,toggletag,5
bind=super+alt+shift,6,toggletag,6
bind=super+alt+shift,7,toggletag,7
bind=super+alt+shift,8,toggletag,8
bind=super+alt+shift,9,toggletag,9
bind=super+alt+shift,0,toggletag,0

# toggle tag view
bind=super+alt,1,toggleview,1
bind=super+alt,2,toggleview,2
bind=super+alt,3,toggleview,3
bind=super+alt,4,toggleview,4
bind=super+alt,5,toggleview,5
bind=super+alt,6,toggleview,6
bind=super+alt,7,toggleview,7
bind=super+alt,8,toggleview,8
bind=super+alt,9,toggleview,9

# monitor switch
bind=super,space,focusmon,left
bind=super,backspace,focusmon,right
bind=super+shift,space,tagmon,left
bind=super+shift,backspace,tagmon,right

bind=super,home,focusmon,left
bind=super,end,focusmon,right
bind=super+shift,home,tagmon,left
bind=super+shift,end,tagmon,right

# axis bindings
axisbind=super,up,viewtoleft_have_client
axisbind=super,down,viewtoright_have_client

### Window Management
# Overview Setting
enable_hotarea=1

# switch window status
bind=super,g,toggleglobal,
bind=super,o,toggleoverview,
bind=super,slash,togglefloating,
bind=super,a,togglemaximizescreen,
bind=super,f,togglefullscreen,
bind=super+shift,f,togglefakefullscreen,
bind=super,t,toggleoverlay,
bind=super,i,minimized,
bind=super+shift,i,restore_minimized
bind=super,u,toggle_scratchpad

### Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=super,r,reload_config

# menu and terminal
bind=super,escape,spawn,fuzzel
bind=super,Return,spawn,kitty

# exit
bind=super,q,quit
bind=super,d,killclient,

# windows
bind=super,w,setkeymode,windows
keymode=windows
# resizewin
bind=none,k,resizewin,+0,-50
bind=none,j,resizewin,+0,+50
bind=none,h,resizewin,-50,+0
bind=none,l,resizewin,+50,+0
# movewin
bind=none,up,movewin,+0,-50
bind=none,down,movewin,+0,+50
bind=none,left,movewin,-50,+0
bind=none,right,movewin,+50,+0
# restore mode
bind=none,escape,setkeymode,default
keymode=default

# mouse button bindings
mousebind=super,btn_left,moveresize,curmove
mousebind=super,btn_middle,toggleoverview,
mousebind=super,btn_right,moveresize,curresize

# exit
bind=super,x,setkeymode,exit
keymode=exit
bind=none,k,spawn_shell,mmsg -d setkeymode,default && swaylock -f -i $(~/.config/mango/wallpaper.sh)
bind=none,l,quit
bind=none,u,spawn_shell,mmsg -d setkeymode,default && loginctl suspend
bind=none,r,spawn_shell,loginctl reboot || systemctl reboot
bind=none,s,spawn_shell,loginctl poweroff || shutdown -h now
bind=none,escape,setkeymode,default
bind=none,return,setkeymode,default
keymode=default

### Screen capture/recording
bind=none,print,spawn_shell,~/.config/mango/recorder.sh stop || mmsg -d setkeymode,screencopy
keymode=screencopy
bind=none,a,spawn_shell,mmsg -d setkeymode,default && grim -o "$(mmsg -g -o | grep 'selmon 1' | cut -d ' ' -f 1)" "$(~/.config/mango/screenshot_file.sh)"
bind=none,s,spawn_shell,mmsg -d setkeymode,default && grim -g "$(slurp)" "$(~/.config/mango/screenshot_file.sh)"
bind=none,d,spawn_shell,mmsg -d setkeymode,default && grim -t ppm -o "$(mmsg -g -o | grep 'selmon 1' | cut -d ' ' -f 1)" - | satty --fullscreen --filename - --output-filename "$(~/.config/mango/screenshot_file.sh)"
bind=none,f,spawn_shell,mmsg -d setkeymode,default && grim -t ppm -g "$(slurp)" - | satty --fullscreen --filename - --output-filename "$(~/.config/mango/screenshot_file.sh)"
bind=none,g,spawn_shell,mmsg -d setkeymode,default && grim -t ppm -g "$(~/.config/mango/current_window_geometry.sh)" - | satty --fullscreen --filename - --output-filename "$(~/.config/mango/screenshot_file.sh)"
bind=none,e,spawn_shell,mmsg -d setkeymode,default && ~/.config/mango/recorder.sh start -o "$(mmsg -g -o | grep 'selmon 1' | cut -d ' ' -f 1)"
bind=none,r,spawn_shell,mmsg -d setkeymode,default && ~/.config/mango/recorder.sh start -g "$(slurp)"
bind=none,escape,setkeymode,default
bind=none,return,setkeymode,default
bind=none,print,setkeymode,default
keymode=default

# avoid occlusion and ghosting in screen captures
layerrule=noanim:1,noblur:1,layer_name:selection

### Window rules
windowrule=tags:2,monitor:DP-1,appid:Eclipse
# windowrule=istagsilent:1,title:.*Eclipse IDE,appid:Eclipse
windowrule=width:1200,height:800,isfloating:1,title:termfilechooser
windowrule=isterm:1,appid:kitty
windowrule=width:1200,height:800,isfloating:1,title:KeePassXC

### Autostart
exec-once=gentoo-pipewire-launcher restart
exec-once=swayidle timeout 300 "swaylock -i $(~/.config/mango/wallpaper.sh)" timeout 300 "wlr-dpms off" resume "wlr-dpms on"
exec-once=swaybg -m fill -i $(~/.config/mango/wallpaper.sh)
exec-once=waybar --config ~/.config/mango/waybar/config.jsonc
exec-once=kanshi

##
source-optional=./local.conf

