# Restart xdg-desktop-portal service after making changes here
# systemd: systemctl --user restart xdg-desktop-portal.service
[preferred]
default=kde
org.freedesktop.impl.portal.ScreenCast=wlr
org.freedesktop.impl.portal.Screenshot=wlr
org.freedesktop.impl.portal.Secret=kwallet
# https://github.com/flatpak/xdg-desktop-portal-gtk/issues/465
org.freedesktop.impl.portal.Inhibit=none

# https://github.com/hunkyburrito/xdg-desktop-portal-termfilechooser
org.freedesktop.impl.portal.FileChooser=termfilechooser
