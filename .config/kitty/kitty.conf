enable_audio_bell no

include ./dayfox.conf
font_size 10
font_family         IBM Plex Mono
bold_font           auto
italic_font         auto
bold_italic_font    auto

# Manually map codepoints for Symbols Nerd Font Mono, since there's no way to specify fallback fonts yet
# Charset can be viewed using: fc-match --format='%{charset}\n' "Symbols Nerd Font Mono"
symbol_map U+23FB-U+23FE,U+2630,U+2665,U+26A1,U+276C-U+2771,U+2B58,U+E000-U+E00A,U+E0A0-U+E0A3,U+E0B0-U+E0C8,U+E0CA,U+E0CC-U+E0D2,U+E0D4,U+E0D6-U+E0D7,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E6B8,U+E700-U+E8EF,U+EA60-U+EA88,U+EA8A-U+EA8C,U+EA8F-U+EAC7,U+EAC9,U+EACC-U+EB09,U+EB0B-U+EB4E,U+EB50-U+EC1E,U+ED00-U+EFCE,U+F000-U+F381,U+F400-U+F533,U+F0001-U+F1AF0 Symbols Nerd Font Mono

disable_ligatures cursor
cursor_blink_interval 0
confirm_os_window_close 0

scrollback_lines 20000
scrollback_pager_history_size 24
scrollback_fill_enlarged_window yes

mouse_map left click ungrabbed no-op
mouse_map left doubleclick ungrabbed mouse_click_url

map ctrl+c copy_and_clear_or_interrupt
map ctrl+insert copy_to_clipboard
map shift+insert paste_from_clipboard

map cmd+n new_os_window_with_cwd

# kitty-scrollback.nvim
allow_remote_control socket-only
listen_on unix:/tmp/kitty
shell_integration enabled

# kitty-scrollback.nvim Kitten alias
action_alias kitty_scrollback_nvim kitten /home/vital/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py

# Browse scrollback buffer in nvim
map ctrl+e kitty_scrollback_nvim
# Browse output of the last shell command in nvim
map ctrl+s kitty_scrollback_nvim --config ksb_builtin_last_cmd_output
# Show clicked command output in nvim
mouse_map shift+right press ungrabbed combine : mouse_select_command_output : kitty_scrollback_nvim --config ksb_builtin_last_visited_cmd_output

include ./local.conf
